name: GitHub Pagesへゲームを公開

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ソースを取得
        uses: actions/checkout@v4
      - name: Node.jsを準備
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: 依存関係をインストール
        run: npm ci
      - name: 静的ゲームをビルド
        run: npm run build:pages
      - name: GitHub Pagesを設定
        uses: actions/configure-pages@v5
      - name: 公開ファイルをアップロード
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pagesへ公開
        id: deployment
        uses: actions/deploy-pages@v4
